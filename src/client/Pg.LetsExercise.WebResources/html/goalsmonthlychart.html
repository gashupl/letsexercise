<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Bar Chart Example</title>
    <link rel="stylesheet" href="../styles/goalsmonthlychart.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    <script src="../scripts/goalsmonthlychart.js"></script>
</head>

<body>
    <h1>Monthly push-ups chart</h1>
    <div class="button-container">
        <button id="prevMonthBtn" class="nav-button">← Previous Month</button>
        <button id="nextMonthBtn" class="nav-button">Next Month →</button>
    </div>
    <canvas id="myChart" width="400" height="200"></canvas>
    <script>
        if (LetsExercise && LetsExercise.GoalsMonthlyChart) {
            const chart = new LetsExercise.GoalsMonthlyChart();
            chart.initChart();
            
            // Bind event handlers
            const prevBtn = document.getElementById('prevMonthBtn');
            const nextBtn = document.getElementById('nextMonthBtn');
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => chart.switchOneMonthBackward());
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => chart.switchOneMonthForward());
            }
        } else {
            console.error("LetsExercise.GoalsMonthlyChart is not defined.");
        }
    </script>
</body>

</html>
